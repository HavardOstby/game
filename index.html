<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Chaos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5e6c8;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── HUD ───────────────────────────────────────────── */
    #hud {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #7b3f00;
      color: #fff;
      font-size: 1.1rem;
      letter-spacing: .5px;
    }
    #hud span { font-weight: 700; font-size: 1.3rem; }
    #speed-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .9rem;
    }
    #speed-bar {
      width: 120px;
      height: 10px;
      background: #5a2d00;
      border-radius: 5px;
      overflow: hidden;
    }
    #speed-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f9c74f, #f3722c);
      transition: width .4s;
      border-radius: 5px;
    }

    /* ── KITCHEN SCENE ─────────────────────────────────── */
    #kitchen {
      position: relative;
      width: 900px;
      height: 560px;
      background: linear-gradient(180deg, #d4f1f4 0%, #d4f1f4 55%, #c2a06e 55%, #c2a06e 100%);
      border: 4px solid #7b3f00;
      overflow: hidden;
      cursor: default;
    }

    /* wall tiles */
    #kitchen::before {
      content: '';
      position: absolute;
      inset: 0 0 45% 0;
      background-image:
        repeating-linear-gradient(0deg, rgba(0,0,0,.06) 0, rgba(0,0,0,.06) 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(90deg, rgba(0,0,0,.06) 0, rgba(0,0,0,.06) 1px, transparent 1px, transparent 80px);
    }

    /* countertop */
    #countertop {
      position: absolute;
      bottom: 45%;
      left: 0; right: 0;
      height: 22px;
      background: linear-gradient(180deg, #f0e0c0, #c8a060);
      border-top: 2px solid #7b3f00;
      border-bottom: 2px solid #7b3f00;
      z-index: 5;
    }

    /* floor */
    #floor {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 45%;
      background: repeating-linear-gradient(
        90deg,
        #c2a06e 0px, #c2a06e 58px,
        #a8855a 58px, #a8855a 60px
      );
    }

    /* ── CABINETS ───────────────────────────────────────── */
    .cabinet {
      position: absolute;
      background: #a0522d;
      border: 3px solid #7b3f00;
      border-radius: 4px;
    }

    /* upper cabinets (wall) */
    .cabinet.upper {
      top: 6%;
      height: 36%;
    }

    /* lower cabinets (base) */
    .cabinet.lower {
      bottom: 45%;
      transform: translateY(100%);
      height: 100%;  /* filled by JS */
    }

    /* ── DOOR ───────────────────────────────────────────── */
    .door-panel {
      position: absolute;
      inset: 4px;
      background: #cd853f;
      border: 2px solid #8b4513;
      border-radius: 3px;
      overflow: hidden;
      transform-origin: left center;
      transition: transform .25s ease;
      cursor: pointer;
      user-select: none;
    }
    .door-panel:hover { filter: brightness(1.12); }
    .door-panel.open {
      transform: perspective(400px) rotateY(-70deg);
    }
    /* inner door frame lines */
    .door-panel::before, .door-panel::after {
      content: '';
      position: absolute;
      background: rgba(0,0,0,.15);
      border-radius: 2px;
    }
    .door-panel::before { inset: 8px 8px 50% 8px; }
    .door-panel::after  { inset: 52% 8px 8px 8px; }

    /* handle */
    .handle {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 24px;
      background: #d4af37;
      border-radius: 3px;
      pointer-events: none;
    }

    /* ── DRAWER ─────────────────────────────────────────── */
    .drawer-panel {
      position: absolute;
      background: #cd853f;
      border: 2px solid #8b4513;
      border-radius: 3px;
      left: 4px; right: 4px;
      cursor: pointer;
      user-select: none;
      transition: top .25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .drawer-panel:hover { filter: brightness(1.12); }
    .drawer-panel.open {
      /* pushed down = pulled out; actual offset set inline via JS */
    }
    .drawer-handle {
      width: 40%;
      height: 6px;
      background: #d4af37;
      border-radius: 3px;
      pointer-events: none;
    }

    /* ── FLASH EFFECT ───────────────────────────────────── */
    .flash {
      animation: flashAnim .3s ease;
    }
    @keyframes flashAnim {
      0%   { filter: brightness(1.8); }
      100% { filter: brightness(1); }
    }

    /* ── SCORE POP ──────────────────────────────────────── */
    .score-pop {
      position: absolute;
      font-weight: 900;
      font-size: 1.4rem;
      color: #2d9e2d;
      pointer-events: none;
      z-index: 50;
      animation: popUp .8s ease forwards;
    }
    @keyframes popUp {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-50px); }
    }

    /* ── OVERLAY ────────────────────────────────────────── */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      color: #fff;
    }
    #overlay h1 {
      font-size: 3rem;
      text-shadow: 2px 2px 8px #000;
      margin-bottom: 10px;
    }
    #overlay p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      text-align: center;
      max-width: 380px;
      line-height: 1.6;
    }
    #overlay button {
      padding: 14px 40px;
      font-size: 1.2rem;
      font-weight: 700;
      background: #f3722c;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      transition: transform .15s, background .15s;
    }
    #overlay button:hover { background: #e85d04; transform: scale(1.05); }

    /* ── MISS INDICATOR ────────────────────────────────── */
    #miss-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .life { font-size: 1.2rem; }
  </style>
</head>
<body>

<div id="hud">
  <div>Score: <span id="score-display">0</span></div>
  <div id="speed-bar-wrap">
    🔥 Speed
    <div id="speed-bar"><div id="speed-fill"></div></div>
  </div>
  <div id="miss-bar-wrap">
    Lives: <span id="lives-display">❤️❤️❤️</span>
  </div>
</div>

<div id="kitchen">
  <div id="countertop"></div>
  <div id="floor"></div>
  <div id="overlay">
    <h1>🍳 Kitchen Chaos</h1>
    <p>Doors and drawers keep flying open!<br>
       Click to <strong>close</strong> them before they pile up.<br>
       You lose a life every time an open item stays open too long. Speed increases over time!</p>
    <button id="start-btn">Start Game</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   KITCHEN LAYOUT DEFINITION
   ═══════════════════════════════════════════════ */
const KITCHEN_W = 900;
const KITCHEN_H = 560;
const COUNTER_BOTTOM_PCT = 0.45; // 45 % from bottom
const COUNTER_Y = KITCHEN_H * (1 - COUNTER_BOTTOM_PCT); // y of countertop top edge

// Upper cabinet specs (as % of kitchen width)
const UPPER_CABS = [
  { id:'uc0', left:20,  width:120, doors:1 },
  { id:'uc1', left:155, width:160, doors:2 },
  { id:'uc2', left:330, width:100, doors:1 },
  { id:'uc3', left:445, width:200, doors:2 },
  { id:'uc4', left:660, width:130, doors:1 },
  { id:'uc5', left:805, width: 80, doors:1 },
];

// Lower cabinet specs
const LOWER_CABS = [
  { id:'lc0', left:20,  width:120, drawers:2, doors:1 },
  { id:'lc1', left:155, width:160, drawers:1, doors:1 },
  { id:'lc2', left:330, width:100, drawers:0, doors:1 },
  { id:'lc3', left:445, width:200, drawers:2, doors:2 },
  { id:'lc4', left:660, width:130, drawers:1, doors:1 },
  { id:'lc5', left:805, width: 80, drawers:1, doors:0 },
];

/* ═══════════════════════════════════════════════
   GAME STATE
   ═══════════════════════════════════════════════ */
let items = [];        // { el, type:'door'|'drawer', isOpen, baseTop(drawers) }
let score = 0;
let lives = 3;
let level = 1;
let gameRunning = false;
let openInterval = null;
let penaltyInterval = null;
let baseDelay = 1800;  // ms between random openings
let minDelay   = 350;
let speedStep  = 80;   // decrease per opened item
let currentDelay = baseDelay;

const kitchen    = document.getElementById('kitchen');
const overlay    = document.getElementById('overlay');
const startBtn   = document.getElementById('start-btn');
const scoreDisp  = document.getElementById('score-display');
const livesDisp  = document.getElementById('lives-display');
const speedFill  = document.getElementById('speed-fill');

/* ═══════════════════════════════════════════════
   BUILD CABINETS
   ═══════════════════════════════════════════════ */
function buildKitchen() {
  // Remove old cabinets
  kitchen.querySelectorAll('.cabinet').forEach(e => e.remove());
  items = [];

  const upperTop    = KITCHEN_H * 0.06;
  const upperHeight = KITCHEN_H * 0.36;

  UPPER_CABS.forEach(spec => {
    const cab = makeCabinet(spec.left, upperTop, spec.width, upperHeight, 'upper');
    // doors take full panel
    addDoors(cab, spec.doors, upperHeight, spec.id, 'upper');
    kitchen.appendChild(cab);
  });

  const lowerHeight = COUNTER_Y - (KITCHEN_H * 0.06 + KITCHEN_H * 0.36) * 0; // full base
  // lower cabs sit directly below countertop
  const lowerBottom = COUNTER_Y; // top of countertop
  const lowerTop    = lowerBottom - KITCHEN_H * 0.28;
  const lowerH      = KITCHEN_H * 0.28;

  LOWER_CABS.forEach(spec => {
    const cab = makeCabinet(spec.left, lowerTop, spec.width, lowerH, 'lower');

    const drawerCount = spec.drawers;
    const doorCount   = spec.doors;
    const drawerH     = drawerCount > 0 ? Math.min(lowerH * 0.32, 44) : 0;
    const drawerArea  = drawerCount * (drawerH + 2);
    const doorAreaTop = drawerArea + 4;
    const doorAreaH   = lowerH - doorAreaTop - 4;

    for (let d = 0; d < drawerCount; d++) {
      const top = 4 + d * (drawerH + 2);
      addDrawer(cab, top, drawerH, `${spec.id}_dr${d}`);
    }
    if (doorCount > 0 && doorAreaH > 20) {
      addDoors(cab, doorCount, doorAreaH, spec.id, 'lower', doorAreaTop);
    }
    kitchen.appendChild(cab);
  });
}

function makeCabinet(left, top, width, height, cls) {
  const el = document.createElement('div');
  el.className = `cabinet ${cls}`;
  el.style.left   = left + 'px';
  el.style.top    = top  + 'px';
  el.style.width  = width + 'px';
  el.style.height = height + 'px';
  return el;
}

function addDoors(cab, count, availH, cabId, tier, topOffset = 4) {
  const cabW = parseInt(cab.style.width);
  const panelW = (cabW - (count + 1) * 4) / count;

  for (let i = 0; i < count; i++) {
    const door = document.createElement('div');
    door.className = 'door-panel';
    door.style.top    = topOffset + 'px';
    door.style.bottom = '4px';
    door.style.left   = (4 + i * (panelW + 4)) + 'px';
    door.style.width  = panelW + 'px';
    door.style.right  = 'auto';
    door.style.inset  = 'unset'; // override inset

    const handle = document.createElement('div');
    handle.className = 'handle';
    door.appendChild(handle);

    door.addEventListener('click', () => closeItem(itemOf(door)));
    cab.appendChild(door);

    items.push({ el: door, type: 'door', isOpen: false });
  }
}

function addDrawer(cab, top, height, id) {
  const drawer = document.createElement('div');
  drawer.className = 'drawer-panel';
  drawer.style.top    = top + 'px';
  drawer.style.height = height + 'px';

  const handle = document.createElement('div');
  handle.className = 'drawer-handle';
  drawer.appendChild(handle);

  drawer.addEventListener('click', () => closeItem(itemOf(drawer)));
  cab.appendChild(drawer);

  items.push({ el: drawer, type: 'drawer', isOpen: false, baseTop: top, openOffset: height + 6 });
}

function itemOf(el) {
  return items.find(it => it.el === el);
}

/* ═══════════════════════════════════════════════
   GAME LOGIC
   ═══════════════════════════════════════════════ */
function openRandomItem() {
  const closed = items.filter(it => !it.isOpen);
  if (closed.length === 0) return;
  const it = closed[Math.floor(Math.random() * closed.length)];
  openItem(it);
}

function openItem(it) {
  it.isOpen = true;
  if (it.type === 'door') {
    it.el.classList.add('open');
  } else {
    it.el.style.top = (it.baseTop + it.openOffset) + 'px';
    it.el.classList.add('open');
  }
}

function closeItem(it) {
  if (!it || !it.isOpen) return;
  it.isOpen = false;
  if (it.type === 'door') {
    it.el.classList.remove('open');
  } else {
    it.el.style.top = it.baseTop + 'px';
    it.el.classList.remove('open');
  }

  // Score
  score += 10;
  scoreDisp.textContent = score;

  // Speed up a little
  currentDelay = Math.max(minDelay, currentDelay - speedStep);
  rescheduleOpen();
  updateSpeedBar();

  // Score pop
  showPop(it.el, '+10');

  // Flash
  it.el.classList.remove('flash');
  void it.el.offsetWidth;
  it.el.classList.add('flash');
}

function penalizeOpenItems() {
  const openCount = items.filter(it => it.isOpen).length;
  if (openCount === 0) return;

  lives = Math.max(0, lives - 1);
  updateLives();

  if (lives === 0) {
    endGame();
  }
}

function rescheduleOpen() {
  clearInterval(openInterval);
  openInterval = setInterval(openRandomItem, currentDelay);
}

function updateSpeedBar() {
  const pct = 100 - ((currentDelay - minDelay) / (baseDelay - minDelay)) * 100;
  speedFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
}

function updateLives() {
  livesDisp.textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
}

function showPop(el, text) {
  const rect = el.getBoundingClientRect();
  const kRect = kitchen.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = text;
  pop.style.left = (rect.left - kRect.left + rect.width / 2 - 20) + 'px';
  pop.style.top  = (rect.top  - kRect.top - 10) + 'px';
  kitchen.appendChild(pop);
  pop.addEventListener('animationend', () => pop.remove());
}

/* ═══════════════════════════════════════════════
   START / END
   ═══════════════════════════════════════════════ */
function startGame() {
  score = 0;
  lives = 3;
  currentDelay = baseDelay;
  gameRunning = true;

  scoreDisp.textContent = '0';
  updateLives();
  updateSpeedBar();

  overlay.style.display = 'none';
  buildKitchen();

  // Open first item after short delay
  setTimeout(openRandomItem, 800);
  rescheduleOpen();

  // Penalty every 5 seconds: lose a life if any item is open
  penaltyInterval = setInterval(penalizeOpenItems, 5000);
}

function endGame() {
  gameRunning = false;
  clearInterval(openInterval);
  clearInterval(penaltyInterval);

  // Show all open indicators
  overlay.innerHTML = `
    <h1>Game Over!</h1>
    <p>You scored <strong>${score}</strong> points.<br>
    The kitchen got away from you! 🍳</p>
    <button id="start-btn">Play Again</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('start-btn').addEventListener('click', startGame);
}

startBtn.addEventListener('click', startGame);
</script>
</body>
</html>
